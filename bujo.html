<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="./img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
    <link rel="shortcut icon" href="./img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png" />
    <link rel="manifest" href="./img/site.webmanifest" />
    <title>Today - BuJo.io</title>
</head>
<body>
    <main class="main">
        <h1 class="mainTitle">Today</h1>
        <p class="mainDescription">
            <time id="current-date"></time>
        </p>
        <nav class="view-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="bujo.html">Today</a>
            <a href="bujo.html?view=week">This Week</a>
            <a href="bujo.html?view=month">This Month</a>
            <a href="bujo.html?view=year">This Year</a>
            <a href="archive.html">Archive</a>
        </nav>
        
        <section id="entries-list"></section>

        <form class="log-form" id="log-form" action="#" method="post">
            <div class="form-group">
                <label>Log Type:</label>
                <div class="radio-group">
                    <input type="radio" id="todo"   name="log-type" value="todo" required>
                    <label for="todo" class="log-type-label">
                        <span class="log-type-bullet log-type-bullet--todo"></span>
                        To-Do
                    </label>

                    <input type="radio" id="event"  name="log-type" value="event">
                    <label for="event" class="log-type-label">
                        <span class="log-type-bullet log-type-bullet--event">◆</span>
                        Event
                    </label>

                    <input type="radio" id="memory" name="log-type" value="memory">
                    <label for="memory" class="log-type-label">
                        <span class="log-type-bullet log-type-bullet--memory">#</span>
                        Memory
                    </label>
                </div>
            </div>

            <div class="form-group" id="date-group">
                <label for="log-date">Date:</label>
                <input type="date" id="log-date" name="log-date">
            </div>

            <div class="form-group">
                <label for="log-entry">Log Entry:</label>
                <div id="editor"></div>
                <input type="hidden" id="log-entry" name="log-entry">
            </div>

            <button type="submit" class="submit-btn">Save Log</button>
        </form>

        <section id="holidays-section" class="collapsed">
            <h2 id="holidays-toggle" style="cursor: pointer;">
        ▶ Upcoming Holidays
            </h2>
            <div id="holiday-list" class="hidden"></div>
        </section>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/index.js"></script>
</body>
</html>
