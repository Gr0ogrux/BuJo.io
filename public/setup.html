<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" type="image/png" href="/public/img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/img/favicon.svg" />
    <link rel="shortcut icon" href="/public/img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public/img/apple-touch-icon.png" />
    <link rel="manifest" href="/public/img/site.webmanifest" />
    <title>Setup - BuJo.io</title>
</head>
<body>
    <main class="main">
        <h1 class="main__title">BuJo.io Setup</h1>
        <p class="main__description">Let's get to know each other.</p>
        
        <form class="setup-form" action="#" method="post">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="timezone">Timezone:</label>
                <select id="timezone" name="timezone" required>
                    <option value="">Select your timezone</option>
                    <option value="America/New_York">Eastern Time (ET)</option>
                    <option value="America/Chicago">Central Time (CT)</option>
                    <option value="America/Denver">Mountain Time (MT)</option>
                    <option value="America/Los_Angeles">Pacific Time (PT)</option>
                    <option value="Europe/London">Greenwich Mean Time (GMT)</option>
                    <option value="Europe/Paris">Central European Time (CET)</option>
                    <option value="Asia/Tokyo">Japan Standard Time (JST)</option>
                    <option value="Australia/Sydney">Australian Eastern Time (AET)</option>
                    <option value="UTC">Coordinated Universal Time (UTC)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Visual Preference:</label>
                <div class="radio-group">
                    <input type="radio" id="dark" name="visual-preference" value="dark" required>
                    <label for="dark">Dark Mode</label>
                    <input type="radio" id="light" name="visual-preference" value="light">
                    <label for="light">Light Mode</label>
                    <input type="radio" id="paper" name="visual-preference" value="paper">
                    <label for="paper">Paper Mode</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Font Size:</label>
                <div class="radio-group">
                    <input type="radio" id="small" name="font-size" value="small" required>
                    <label for="small">Small</label>
                    <input type="radio" id="medium" name="font-size" value="medium">
                    <label for="medium">Medium</label>
                    <input type="radio" id="large" name="font-size" value="large">
                    <label for="large">Large</label>
                </div>
            </div>
            
            <button type="submit" class="submit-btn">Continue</button>
        </form>
    </main>
</html>
