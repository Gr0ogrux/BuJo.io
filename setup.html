<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" type="image/png" href="./img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
    <link rel="shortcut icon" href="./img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png" />
    <link rel="manifest" href="./img/site.webmanifest" />
    <title>Setup - BuJo.io</title>
</head>
<body>
    <main class="main">
        <h1 class="main__title">BuJo.io Setup</h1>
        <p class="main__description">Let's get to know each other.</p>
        
        <form class="setup-form" action="#" method="post">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="timezone">Timezone:</label>
                <select id="timezone" name="timezone" required>
                    <option value="">Select your timezone</option>
                    <option value="America/New_York">Eastern Time (ET)</option>
                    <option value="America/Chicago">Central Time (CT)</option>
                    <option value="America/Denver">Mountain Time (MT)</option>
                    <option value="America/Los_Angeles">Pacific Time (PT)</option>
                    <option value="Europe/London">Greenwich Mean Time (GMT)</option>
                    <option value="Europe/Paris">Central European Time (CET)</option>
                    <option value="Asia/Tokyo">Japan Standard Time (JST)</option>
                    <option value="Australia/Sydney">Australian Eastern Time (AET)</option>
                    <option value="UTC">Coordinated Universal Time (UTC)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Visual Preference:</label>
                <div class="radio-group">
                    <input type="radio" id="dark" name="visual-preference" value="dark" required>
                    <label for="dark" class="log-type-label">
                        <span class="setup-icon">◐</span>
                        Dark Mode
                    </label>
                    <input type="radio" id="light" name="visual-preference" value="light" checked>
                    <label for="light" class="log-type-label">
                        <span class="setup-icon">○</span>
                        Light Mode
                    </label>
                    <input type="radio" id="paper" name="visual-preference" value="paper">
                    <label for="paper" class="log-type-label">
                        <span class="setup-icon">📄</span>
                        Paper Mode
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Font Size:</label>
                <div class="radio-group">
                    <input type="radio" id="small" name="font-size" value="small" required>
                    <label for="small" class="log-type-label">
                        <span class="setup-icon setup-icon--small">A</span>
                        Small
                    </label>
                    <input type="radio" id="medium" name="font-size" value="medium" checked>
                    <label for="medium" class="log-type-label">
                        <span class="setup-icon setup-icon--medium">A</span>
                        Medium
                    </label>
                    <input type="radio" id="large" name="font-size" value="large">
                    <label for="large" class="log-type-label">
                        <span class="setup-icon setup-icon--large">A</span>
                        Large
                    </label>
                </div>
            </div>
            
            <button type="submit" class="submit-btn">Continue</button>
        </form>
    </main>
    <script src="./js/storage.js"></script>
    <script src="./js/setup.js"></script> 
</body>
</html>
